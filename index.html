<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Lexical Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="app-container">
            
            <header class="top-bar">
                <div class="logo">LUMINA LEXICAL ANALYZER</div>
                <div class="controls">
                    <label class="switch">
                        <input type="checkbox" id="themeToggle">
                        <span class="slider round"></span>
                    </label>
                    <i class="fa-solid fa-gear settings-icon"></i>
                </div>
            </header>

            <div class="content-grid">
                
                <div class="left-panel">
                    <div class="panel-header">
                        <i class="fa-solid fa-code"></i>
                        <span>Source Code:</span>
                    </div>
                    
                    <div class="editor-wrapper">
                        <textarea id="sourceInput" placeholder="//insert code here" spellcheck="false"></textarea>
                    </div>

                    <div class="action-bar">
                        <input type="file" id="fileUpload" hidden>
                        <button class="btn btn-dark" onclick="document.getElementById('fileUpload').click()">
                            <i class="fa-solid fa-upload"></i> UPLOAD
                        </button>
                        
                        <button class="btn btn-light" onclick="analyzeCode()">
                            <i class="fa-solid fa-play"></i> ANALYZE
                        </button>
                        
                        <button class="btn btn-grey" onclick="clearAll()">
                            <i class="fa-solid fa-trash-can"></i> CLEAR
                        </button>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Lexemes</th>
                                    <th>Tokens</th>
                                    <th>Type</th>
                                </tr>
                            </thead>
                            <tbody id="resultBody">
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                                <tr><td>example</td><td>example</td><td>example</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
